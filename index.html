<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nauči Kako Fotografirati — Legal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #F9FAFB;
            color: #1F2937;
            line-height: 1.6;
            padding: 48px 24px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 48px;
        }
        .icon {
            width: 96px;
            height: 96px;
            background: linear-gradient(145deg, #0D9488, #0F766E);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 17px;
            color: #6B7280;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }
        .links a {
            display: block;
            padding: 16px 20px;
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            text-decoration: none;
            color: #1F2937;
            font-size: 17px;
            font-weight: 500;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .links a:hover {
            border-color: #0D9488;
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.10);
        }
        .links a span {
            float: right;
            color: #9CA3AF;
        }
        footer {
            text-align: center;
            margin-top: 48px;
            font-size: 13px;
            color: #9CA3AF;
        }

    <div class="container">
        <div class="hero">

        </div>
        <div class="links">
            <a href="privacy.html">Privacy Policy <span>→</span></a>
            <a href="support.html">Support &amp; FAQ <span>→</span></a>
        </div>
        <footer>
            &copy; 2026 SoftSplit d.o.o., Split, Croatia
        </footer>
    </div>

</html>
